services:
    db:
        container_name: sistemabecas-db
        image: mysql:oraclelinux9
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: sistemabecas
        volumes:
            - ./sistemabecas-db:/docker-entrypoint-initdb.d
        ports:
            - 3306:3306
    
    backend:
        container_name: sistemabecas-backend
        build: ./sistemabecas-backend
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            JWT_TOKEN: ${JWT_TOKEN}
        volumes:
            - ./uploads:/uploads
        ports:
            - 8080:8080
        depends_on:
            - db
            
    auth:
        container_name: sistemabecas-auth
        build: ./sistemabecas-auth
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            JWT_TOKEN: ${JWT_TOKEN}
        ports:
            - 7070:8080
        depends_on:
            - db
            - backend
    
    frontend:
        container_name: sistemabecas-frontend
        build: ./sistemabecas-frontend
        restart: always
        ports:
            - 4200:4200
        depends_on:
            - backend
            
    reverse_proxy:
        container_name: sistemabecas-reverseproxy
        image: nginx:trixie-perl
        volumes:
            - ./sistemabecas-reverseproxy/nginx.conf:/etc/nginx/nginx.conf:ro
        ports:
            - 80:80
        depends_on:
            - frontend
