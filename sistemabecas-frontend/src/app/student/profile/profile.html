<div class="container">
	<h1>Editar Información</h1>
	<div class="row">
		<form>
			<div class="mb-2">
				<label for="nombres" class="form-label">Nombres:</label>
				<input type="text" class="form-control" id="nombres"  value={{profileService.getUserNombres()}} >
			</div>
			<div class="mb-2">
				<label for="apellidos" class="form-label">Apellidos:</label>
				<input type="text" class="form-control" id="apellidos"  value={{profileService.getUserApellidos()}} >
			</div>
			<div class="mb-2">
				<label for="rut" class="form-label">RUT:</label>
				<input type="email" class="form-control" id="rut" value={{profileService.getUserRut()}}>
			</div>
			<div class="mb-2">
				<label for="correo" class="form-label">Correo electrónico:</label>
				<input type="email" class="form-control" id="correo"  value={{profileService.getUserEmail()}} >
			</div>
			<div class="mb-2">
				<label for="contrasena" class="form-label">Contraseña:</label>
				<input type="password" class="form-control" id="contrasena"  value={{profileService.getUserContrasena()}} >
			</div>
			<div class="d-flex justify-content-between">
				<button type="submit" class="btn btn-primary">Editar perfil</button>
				<button type="submit" class="btn btn-danger">Eliminar perfil</button>
			</div>
		</form>
	</div>
</div>
