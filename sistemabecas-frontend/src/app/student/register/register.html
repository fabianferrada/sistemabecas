<div class="container mb-5 mt-5">
	<div class="row">
		<div class="text-center mb-4">
			<h1>Sistema de postulación de becas</h1>
		</div>
	</div>
	<div class="row">
		<div class="text-center mb-4">
			<h3>Formulario de registro</h3>
		</div>
	</div>
	<div class="row justify-content-center">
			<div class="col-xl-4 col-sm-4">			
				<form>
					<div class="form-outline mb-4">
						<input type="text" class="form-control" placeholder="Nombres" />
					</div>
					<div class="form-outline mb-4">
						<input type="text" class="form-control" placeholder="Apellidos" />
					</div>
					<div class="form-outline mb-4">
						<input type="email" class="form-control" placeholder="Correo electrónico" />
					</div>
					<div class="form-outline mb-4">
						<input type="password" class="form-control" placeholder="Contraseña" />
					</div>
					<div class="row mb-4">
						<button class="btn btn-primary btn-block">Regístrate</button>
					</div>
					<div class="row align-items-center mb-4 text-center">
						<button type="button" (click)="goLogin()" class="btn btn-link">Iniciar sesión</button>
					</div>
				</form>
			</div>
	</div>
</div>
